<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DSShed — Digital Storage Shed，Chengdusen 的个人工具箱与文档库，随时随地访问下载。">
  <meta name="keywords" content="DSShed,工具箱,文档库,安装包下载,在线工具,Chengdusen">
  <meta name="author" content="Chengdusen">
  <meta name="theme-color" content="#0f0f13">
  <meta property="og:title" content="DSShed — 个人工具箱与文档库">
  <meta property="og:description" content="Digital Storage Shed，随时随地下需要的工具和文档。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://chengdusen.github.io/">
  <title>DSShed — 个人工具箱与文档库</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a1a24'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='52' font-weight='bold' font-family='system-ui,sans-serif' fill='%237c6ff7'%3EDS%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a1a24'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='52' font-weight='bold' font-family='system-ui,sans-serif' fill='%237c6ff7'%3EDS%3C/text%3E%3C/svg%3E">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-container">
  <!-- ===== Header ===== -->
  <header class="header">
    <div class="header__logo">
      <div class="header__icon">🧰</div>
      <h1 class="header__title" id="site-name">DSShed</h1>
    </div>
    <p class="header__tagline" id="site-tagline">Digital Storage Shed — 我的个人工具箱与文档库</p>
    <span class="header__meta" id="site-owner">By Chengdusen</span>
  </header>

  <!-- ===== Search ===== -->
  <section class="search-section">
    <div class="search-wrapper">
      <input
        type="text"
        id="search-input"
        class="search-input"
        placeholder="搜索工具、文档…（Ctrl+K 快速聚焦）"
        autocomplete="off"
      >
      <span class="search-icon">🔍</span>
      <button
        type="button"
        id="search-clear"
        class="search-clear"
        title="清除搜索 (Esc)"
        aria-label="清除搜索"
      >✕</button>
    </div>
  </section>

  <!-- ===== Categories ===== -->
  <nav class="category-section">
    <div class="category-tabs" id="category-tabs">
      <!-- Rendered by JS -->
    </div>
  </nav>

  <!-- ===== Items ===== -->
  <main class="items-section">
    <div class="items-section__header" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <h2 style="font-size:1.2rem;font-weight:700;color:var(--text-primary);">📋 所有内容</h2>
      <span id="items-count" style="font-size:0.85rem;color:var(--text-muted);background:var(--bg-input);padding:4px 12px;border-radius:20px;">0 项</span>
    </div>
    <div class="items-grid" id="items-grid">
      <!-- Rendered by JS -->
    </div>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="footer">
    <p>
      © <span id="footer-year">2025</span> DSShed ·
      Built with ❤️ by
      <a href="https://github.com/chengdusen" target="_blank" rel="noopener">Chengdusen</a>
    </p>
    <p style="margin-top:4px;">
      <small>Hosted on <a href="https://pages.github.com/" target="_blank" rel="noopener">GitHub Pages</a></small>
    </p>
  </footer>
</div>

<!-- Back to Top -->
<button id="back-to-top" class="back-to-top" title="回到顶部" aria-label="回到顶部">⬆</button>

<script src="js/app.js"></script>
<script>
  // Register Service Worker for offline caching
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
